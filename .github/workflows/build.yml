name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-apps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - sacramento-311-map-app
          - sacramento-311-maplibre-app
          - sacramento-311-leaflet-app
          - sacramento-homeless-response-dashboard
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run build
